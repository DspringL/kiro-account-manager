name: Version Management

on:
  # 手动触发版本发布
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (optional, e.g., 1.8.4)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # 创建版本标签
  create-version:
    name: Create Version Tag
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if [ -n "${{ inputs.custom_version }}" ]; then
            # 使用自定义版本号
            VERSION="${{ inputs.custom_version }}"
            # 移除前缀 v（如果有）
            VERSION="${VERSION#v}"
            
            # 更新 package.json
            npm version $VERSION --no-git-tag-version
            
            # 更新 tauri.conf.json
            jq ".version = \"$VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
            mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
            
            # 更新 Cargo.toml
            sed -i "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml
            
            TAG="v$VERSION"
          else
            # 使用 standard-version 自动版本号
            npm run release:${{ inputs.version_type }}
            
            # 获取最新标签
            TAG=$(git describe --tags --abbrev=0)
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Push changes
        run: |
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger build workflow
        run: |
          gh workflow run build-release.yml \
            --ref main \
            -f release_tag=${{ steps.bump.outputs.tag }} \
            -f release_name="Kiro Account Manager ${{ steps.bump.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output
        run: |
          echo "✅ Version ${{ steps.bump.outputs.version }} created and build triggered!"
          echo "📦 Tag: ${{ steps.bump.outputs.tag }}"
