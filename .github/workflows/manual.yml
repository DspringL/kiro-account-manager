name: Manual Build

on:
  # 仅支持手动触发构建
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.8.4)'
        required: true
        type: string
      release_name:
        description: 'Release name'
        required: false
        type: string
        default: 'Kiro Account Manager'
      draft_release:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: true
        type: boolean

# 权限配置
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # 提取版本号
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Extract version
        id: version
        run: |
          echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          echo "version=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT

  # macOS 构建
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          key: ${{ matrix.os }}-${{ matrix.target }}
          shared-key: "release"

      - name: Install dependencies
        run: npm ci

      - name: Use production Tauri config
        run: cp src-tauri/tauri.conf.prod.json src-tauri/tauri.conf.json

      - name: Sync version to production config
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION_NUM=${VERSION#v}
          jq --arg ver "$VERSION_NUM" '.version = $ver' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ needs.extract-version.outputs.version }}
          releaseName: ${{ inputs.release_name || format('Kiro Account Manager {0}', needs.extract-version.outputs.version) }}
          releaseDraft: ${{ inputs.draft_release }}
          prerelease: ${{ inputs.prerelease }}
          args: --target ${{ matrix.target }}

  # Windows 构建
  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: windows-latest
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          key: ${{ matrix.os }}-${{ matrix.target }}
          shared-key: "release"

      - name: Install dependencies
        run: npm ci

      - name: Use production Tauri config
        run: Copy-Item src-tauri/tauri.conf.prod.json src-tauri/tauri.conf.json

      - name: Sync version to production config
        run: |
          $VERSION = "${{ needs.extract-version.outputs.version }}"
          $VERSION_NUM = $VERSION.TrimStart('v')
          $config = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $config.version = $VERSION_NUM
          $config | ConvertTo-Json -Depth 20 | Set-Content src-tauri/tauri.conf.json

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.extract-version.outputs.version }}
          releaseName: ${{ inputs.release_name || format('Kiro Account Manager {0}', needs.extract-version.outputs.version) }}
          releaseDraft: ${{ inputs.draft_release }}
          prerelease: ${{ inputs.prerelease }}
          args: --target ${{ matrix.target }}

  # Linux 构建
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-22.04
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            rpm \
            libfuse2

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          key: ${{ matrix.os }}-${{ matrix.target }}
          shared-key: "release"

      - name: Install dependencies
        run: npm ci

      - name: Use production Tauri config
        run: cp src-tauri/tauri.conf.prod.json src-tauri/tauri.conf.json

      - name: Sync version to production config
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION_NUM=${VERSION#v}
          jq --arg ver "$VERSION_NUM" '.version = $ver' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Linux AppImage 使用 gzip 压缩，兼容旧版 AppImageLauncher
          APPIMAGETOOL_COMP: gzip
        with:
          tagName: ${{ needs.extract-version.outputs.version }}
          releaseName: ${{ inputs.release_name || format('Kiro Account Manager {0}', needs.extract-version.outputs.version) }}
          releaseDraft: ${{ inputs.draft_release }}
          prerelease: ${{ inputs.prerelease }}
          args: --target ${{ matrix.target }}

  # 生成 Linux deb/rpm 专用的更新 JSON
  generate-linux-json:
    name: Generate Linux Update JSON
    runs-on: ubuntu-latest
    needs: [extract-version, build-linux]
    
    steps:
      - name: Download latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          gh release download "$VERSION" -p "latest.json" -R ${{ github.repository }} -O latest.json || echo "No latest.json found"
          if [ -f latest.json ]; then
            cat latest.json
          fi

      - name: Generate latest-deb.json
        if: hashFiles('latest.json') != ''
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION_NUM=${VERSION#v}
          jq --arg ver "$VERSION" --arg verNum "$VERSION_NUM" '
            .platforms["linux-x86_64"].url = "https://github.com/${{ github.repository }}/releases/download/\($ver)/Kiro.Account.Manager_\($verNum)_amd64.deb"
          ' latest.json > latest-deb.json
          echo "Generated latest-deb.json:"
          cat latest-deb.json

      - name: Generate latest-rpm.json
        if: hashFiles('latest.json') != ''
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          VERSION_NUM=${VERSION#v}
          jq --arg ver "$VERSION" --arg verNum "$VERSION_NUM" '
            .platforms["linux-x86_64"].url = "https://github.com/${{ github.repository }}/releases/download/\($ver)/Kiro.Account.Manager-\($verNum)-1.x86_64.rpm"
          ' latest.json > latest-rpm.json
          echo "Generated latest-rpm.json:"
          cat latest-rpm.json

      - name: Upload JSON files to release
        if: hashFiles('latest.json') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          if [ -f latest-deb.json ] && [ -f latest-rpm.json ]; then
            gh release upload "$VERSION" latest-deb.json latest-rpm.json --clobber -R ${{ github.repository }}
            echo "✅ Uploaded Linux update JSON files"
          else
            echo "⚠️ No JSON files to upload"
          fi
